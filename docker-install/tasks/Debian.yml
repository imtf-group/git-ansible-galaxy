---
- name: Add a signing key for Docker repo
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc

- name: get current architecture
  command: dpkg --print-architecture
  register: current_arch
  changed_when: false

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch={{ current_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_distribution|lower }} {{ ansible_distribution_release }} stable"
    filename: docker
    state: present
    mode: "0644"

- name: install prerequisites
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    update_cache: true
    state: present
    lock_timeout: 600

- name: install docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - python3-pip
    state: present
    lock_timeout: 600
  notify: start docker