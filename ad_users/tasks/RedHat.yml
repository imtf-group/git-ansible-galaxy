---
- name: "add ec2-user to technical group"
  user:
    name: ec2-user
    groups:
      - technical
    append: true
    state: present

- name: install prerequisites
  dnf:
    name:
      - sssd
      - sssd-tools
      - openldap-clients
      - sssd-ldap
      - oddjob-mkhomedir
    update_cache: true
    state: present

- name: check if tlog is installed
  stat:
    path: /usr/bin/tlog-rec-session
  register: st_tlog_installed

- name: use tlog if installed
  set_fact:
    ad_default_shell: /usr/bin/tlog-rec-session
  when: st_tlog_installed.stat.exists

- name: copy SSSd configuration
  template:
    src: sssd.conf.j2
    dest: /etc/sssd/sssd.conf
    mode: "0600"
  notify:
    - execute authconfig
    - restart sssd
    - restart oddjobd

- name: create technical group
  group:
    name: technical
    gid: 5202
    state: present

- name: update access.conf
  template:
    src: access.conf.j2
    dest: /etc/security/access.conf
    mode: "0644"
    owner: root
    group: root

- meta: flush_handlers

- name: copy NSSwitch configuration
  copy:
    src: nsswitch.conf
    dest: /etc/nsswitch.conf
    mode: "0644"
  notify: restart systemd-logind

- name: give access to docker group
  lineinfile:
    line: '*;*;*;Al0000-2400;docker'
    path: /etc/security/group.conf
    state: present

- name: update PAM configuration for groups
  lineinfile:
    path: /etc/pam.d/password-auth
    insertafter: "pam_env.so"
    line: "auth optional pam_group.so use_first_pass"
    state: present

- name: override default sftp-server binary
  set_fact:
    sftp_server_bin: /usr/libexec/openssh/sftp-server

- name: update SSH configuration
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    mode: "0644"
  notify: restart ssh

- name: add sudoers configuration
  copy:
    src: sudoers
    dest: /etc/sudoers.d/users
    mode: "0644"
    validate: "/usr/sbin/visudo -cf %s"

- name: delete old sudoers configuration
  file:
    path: /etc/sudoers.d/90-cloud-init-users
    state: absent

